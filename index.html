<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulatory Burden Dashboard - Uzbekistan 2019-2024</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
        .stat-card { transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        
        // Get Recharts from window (CDN loads it there)
        const { 
            BarChart, Bar, PieChart, Pie, Cell, AreaChart, Area,
            XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer
        } = window.Recharts;

        // Dashboard Data
        const dashboardData = {"summary": {"total_drafts": 5793, "total_comments": 46019, "avg_comments": 7.94, "zero_comments_pct": 59.0, "total_developers": 261, "total_sectors": 19}, "yearly": [{"year": 2019, "count": 1255, "comments": 8956}, {"year": 2020, "count": 1157, "comments": 7814}, {"year": 2021, "count": 1144, "comments": 4057}, {"year": 2022, "count": 1165, "comments": 12712}, {"year": 2023, "count": 636, "comments": 4539}, {"year": 2024, "count": 436, "comments": 7941}], "monthly": [{"month": "2019-01", "count": 80}, {"month": "2019-02", "count": 116}, {"month": "2019-03", "count": 115}, {"month": "2019-04", "count": 95}, {"month": "2019-05", "count": 97}, {"month": "2019-06", "count": 116}, {"month": "2019-07", "count": 165}, {"month": "2019-08", "count": 120}, {"month": "2019-09", "count": 81}, {"month": "2019-10", "count": 99}, {"month": "2019-11", "count": 74}, {"month": "2019-12", "count": 97}, {"month": "2020-01", "count": 100}, {"month": "2020-02", "count": 88}, {"month": "2020-03", "count": 109}, {"month": "2020-04", "count": 72}, {"month": "2020-05", "count": 106}, {"month": "2020-06", "count": 115}, {"month": "2020-07", "count": 68}, {"month": "2020-08", "count": 48}, {"month": "2020-09", "count": 60}, {"month": "2020-10", "count": 110}, {"month": "2020-11", "count": 128}, {"month": "2020-12", "count": 153}, {"month": "2021-01", "count": 108}, {"month": "2021-02", "count": 183}, {"month": "2021-03", "count": 218}, {"month": "2021-04", "count": 37}, {"month": "2021-05", "count": 27}, {"month": "2021-06", "count": 47}, {"month": "2021-07", "count": 48}, {"month": "2021-08", "count": 116}, {"month": "2021-09", "count": 87}, {"month": "2021-10", "count": 86}, {"month": "2021-11", "count": 106}, {"month": "2021-12", "count": 81}, {"month": "2022-01", "count": 79}, {"month": "2022-02", "count": 100}, {"month": "2022-03", "count": 120}, {"month": "2022-04", "count": 104}, {"month": "2022-05", "count": 102}, {"month": "2022-06", "count": 93}, {"month": "2022-07", "count": 94}, {"month": "2022-08", "count": 128}, {"month": "2022-09", "count": 64}, {"month": "2022-10", "count": 99}, {"month": "2022-11", "count": 87}, {"month": "2022-12", "count": 95}, {"month": "2023-01", "count": 59}, {"month": "2023-02", "count": 36}, {"month": "2023-03", "count": 37}, {"month": "2023-04", "count": 56}, {"month": "2023-05", "count": 88}, {"month": "2023-06", "count": 91}, {"month": "2023-07", "count": 57}, {"month": "2023-08", "count": 33}, {"month": "2023-09", "count": 36}, {"month": "2023-10", "count": 42}, {"month": "2023-11", "count": 59}, {"month": "2023-12", "count": 42}, {"month": "2024-01", "count": 46}, {"month": "2024-02", "count": 47}, {"month": "2024-03", "count": 48}, {"month": "2024-04", "count": 61}, {"month": "2024-05", "count": 86}, {"month": "2024-06", "count": 66}, {"month": "2024-07", "count": 48}, {"month": "2024-08", "count": 17}, {"month": "2024-09", "count": 7}, {"month": "2024-10", "count": 9}, {"month": "2024-11", "count": 1}], "reg_types": [{"type": "Government Resolution", "count": 2430}, {"type": "Ministry Resolution", "count": 1901}, {"type": "Law", "count": 604}, {"type": "Presidential Resolution", "count": 578}, {"type": "Presidential Decree", "count": 182}, {"type": "Other", "count": 98}], "sectors": [{"sector": "Business", "count": 1321}, {"sector": "Education & Culture", "count": 1225}, {"sector": "Ecology", "count": 1009}, {"sector": "Banking", "count": 337}, {"sector": "Labor", "count": 283}, {"sector": "Foreign Trade", "count": 271}, {"sector": "Healthcare", "count": 261}, {"sector": "Housing", "count": 240}, {"sector": "IT & Digital", "count": 230}, {"sector": "Social Protection", "count": 187}], "developers": [{"developer": "Min. Poverty Reduction", "count": 509}, {"developer": "Central Bank", "count": 320}, {"developer": "Min. Digital Tech", "count": 287}, {"developer": "Min. Housing", "count": 256}, {"developer": "Min. Justice", "count": 230}, {"developer": "Min. Transport", "count": 186}, {"developer": "Min. Higher Ed", "count": 171}, {"developer": "Min. Health", "count": 159}, {"developer": "Min. Finance", "count": 155}, {"developer": "Min. Culture", "count": 145}], "comment_distribution": [{"bucket": "0", "count": 3417}, {"bucket": "1-5", "count": 1537}, {"bucket": "6-20", "count": 539}, {"bucket": "21-100", "count": 235}, {"bucket": "101-1000", "count": 60}, {"bucket": "1000+", "count": 5}], "yoy": [{"year": 2020, "change": -7.8}, {"year": 2021, "change": -1.1}, {"year": 2022, "change": 1.8}, {"year": 2023, "change": -45.4}, {"year": 2024, "change": -31.4}], "top_commented": [{"title": "Foreign languages assessment standards", "developer": "Min. Higher Education", "comments": 5398, "year": 2024}, {"title": "Teacher requirements in secondary education", "developer": "Min. Public Education", "comments": 3249, "year": 2022}, {"title": "National Education Program 2022-2026", "developer": "Min. Public Education", "comments": 2716, "year": 2022}, {"title": "Fuel and energy regulation", "developer": "Min. Finance", "comments": 1150, "year": 2022}, {"title": "Latin alphabet implementation", "developer": "Academy of Sciences", "comments": 1035, "year": 2021}]};

        const COLORS = { primary: '#1e3a5f', secondary: '#3d6a8c', accent: '#5c9abd', success: '#10b981', warning: '#f59e0b', danger: '#ef4444' };
        const CHART_COLORS = ['#1e3a5f', '#3d6a8c', '#5c9abd', '#7bc8e8', '#9bd5f0', '#2563eb', '#7c3aed', '#db2777', '#ea580c', '#10b981'];

        const StatCard = ({ title, value, subtitle, icon }) => (
            <div className="card stat-card p-6">
                <div className="flex items-start justify-between">
                    <div>
                        <p className="text-sm font-medium text-gray-500 uppercase tracking-wide">{title}</p>
                        <p className="mt-2 text-3xl font-bold text-gray-900">{value}</p>
                        {subtitle && <p className="mt-1 text-sm text-gray-500">{subtitle}</p>}
                    </div>
                    <div className="p-3 rounded-lg bg-blue-50"><span className="text-2xl">{icon}</span></div>
                </div>
            </div>
        );

        const SectionHeader = ({ title, subtitle }) => (
            <div className="mb-6">
                <h2 className="text-xl font-bold text-gray-800">{title}</h2>
                {subtitle && <p className="text-sm text-gray-500 mt-1">{subtitle}</p>}
            </div>
        );

        const Dashboard = () => {
            const data = dashboardData;
            const [activeTab, setActiveTab] = useState('overview');
            const peakYear = data.yearly.reduce((a, b) => a.count > b.count ? a : b);

            return (
                <div className="min-h-screen">
                    <header className="gradient-bg text-white py-8 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div>
                                    <h1 className="text-3xl font-bold">Regulatory Burden Dashboard</h1>
                                    <p className="mt-2 text-blue-100">Republic of Uzbekistan • 2019-2024</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-sm text-blue-200">Data Source</p>
                                    <p className="font-medium">regulation.gov.uz</p>
                                </div>
                            </div>
                            <div className="mt-6 flex flex-wrap gap-2">
                                {['overview', 'trends', 'sectors', 'institutions', 'participation'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)}
                                        className={`px-4 py-2 rounded-lg font-medium transition-colors ${activeTab === tab ? 'bg-white text-blue-900' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                                        {tab.charAt(0).toUpperCase() + tab.slice(1)}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {activeTab === 'overview' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <StatCard title="Total Draft Regulations" value={data.summary.total_drafts.toLocaleString()} subtitle="Published for consultation" icon="📋" />
                                    <StatCard title="Public Comments" value={data.summary.total_comments.toLocaleString()} subtitle={`${data.summary.avg_comments} avg per draft`} icon="💬" />
                                    <StatCard title="Government Bodies" value={data.summary.total_developers} subtitle="Active regulators" icon="🏛️" />
                                    <StatCard title="Zero Engagement Rate" value={`${data.summary.zero_comments_pct}%`} subtitle="Drafts with no comments" icon="⚠️" />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="card p-6">
                                        <SectionHeader title="Regulatory Output by Year" subtitle="Draft regulations published" />
                                        <ResponsiveContainer width="100%" height={300}>
                                            <BarChart data={data.yearly}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                                <XAxis dataKey="year" tick={{ fill: '#6b7280' }} />
                                                <YAxis tick={{ fill: '#6b7280' }} />
                                                <Tooltip />
                                                <Bar dataKey="count" fill={COLORS.primary} radius={[4, 4, 0, 0]} name="Regulations" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="card p-6">
                                        <SectionHeader title="Regulatory Instruments" subtitle="Distribution by type" />
                                        <ResponsiveContainer width="100%" height={300}>
                                            <PieChart>
                                                <Pie data={data.reg_types} dataKey="count" nameKey="type" cx="50%" cy="50%" innerRadius={50} outerRadius={90} paddingAngle={2} label={({ percent }) => `${(percent * 100).toFixed(0)}%`}>
                                                    {data.reg_types.map((entry, index) => (<Cell key={index} fill={CHART_COLORS[index % CHART_COLORS.length]} />))}
                                                </Pie>
                                                <Tooltip /><Legend />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                <div className="card p-6">
                                    <SectionHeader title="Top Regulatory Sectors" subtitle="Draft regulations by policy area" />
                                    <ResponsiveContainer width="100%" height={400}>
                                        <BarChart data={data.sectors} layout="vertical" margin={{ left: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis type="number" tick={{ fill: '#6b7280' }} />
                                            <YAxis dataKey="sector" type="category" width={150} tick={{ fill: '#6b7280', fontSize: 11 }} />
                                            <Tooltip />
                                            <Bar dataKey="count" fill={COLORS.primary} radius={[0, 4, 4, 0]} name="Regulations" />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}

                        {activeTab === 'trends' && (
                            <div className="space-y-8">
                                <div className="card p-6">
                                    <SectionHeader title="Year-over-Year Change" subtitle="Annual growth rate" />
                                    <ResponsiveContainer width="100%" height={300}>
                                        <BarChart data={data.yoy}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis dataKey="year" tick={{ fill: '#6b7280' }} />
                                            <YAxis tick={{ fill: '#6b7280' }} tickFormatter={(v) => `${v}%`} />
                                            <Tooltip formatter={(v) => [`${v}%`, 'Change']} />
                                            <Bar dataKey="change" radius={[4, 4, 0, 0]}>
                                                {data.yoy.map((entry, index) => (<Cell key={index} fill={entry.change < 0 ? COLORS.success : COLORS.danger} />))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="card p-6">
                                    <SectionHeader title="Monthly Regulatory Output" subtitle="Draft regulations per month" />
                                    <ResponsiveContainer width="100%" height={300}>
                                        <AreaChart data={data.monthly}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis dataKey="month" tick={{ fill: '#6b7280', fontSize: 9 }} angle={-45} textAnchor="end" height={70} interval={5} />
                                            <YAxis tick={{ fill: '#6b7280' }} />
                                            <Tooltip />
                                            <Area type="monotone" dataKey="count" stroke={COLORS.primary} fill={COLORS.accent} fillOpacity={0.3} name="Regulations" />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="card p-6 border-l-4 border-blue-900">
                                        <h3 className="font-semibold text-gray-800">Peak Year</h3>
                                        <p className="text-3xl font-bold mt-2 text-blue-900">{peakYear.year}</p>
                                        <p className="text-gray-500 mt-1">{peakYear.count.toLocaleString()} regulations</p>
                                    </div>
                                    <div className="card p-6 border-l-4 border-green-500">
                                        <h3 className="font-semibold text-gray-800">Total Decline</h3>
                                        <p className="text-3xl font-bold mt-2 text-green-600">-65%</p>
                                        <p className="text-gray-500 mt-1">Since 2019 peak</p>
                                    </div>
                                    <div className="card p-6 border-l-4 border-amber-500">
                                        <h3 className="font-semibold text-gray-800">2024 Output</h3>
                                        <p className="text-3xl font-bold mt-2 text-amber-600">436</p>
                                        <p className="text-gray-500 mt-1">Draft regulations</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'sectors' && (
                            <div className="space-y-8">
                                <div className="card p-6">
                                    <SectionHeader title="All Regulatory Sectors" subtitle="Complete breakdown by policy area" />
                                    <ResponsiveContainer width="100%" height={450}>
                                        <BarChart data={data.sectors} layout="vertical" margin={{ left: 30 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis type="number" tick={{ fill: '#6b7280' }} />
                                            <YAxis dataKey="sector" type="category" width={150} tick={{ fill: '#6b7280', fontSize: 11 }} />
                                            <Tooltip />
                                            <Bar dataKey="count" fill={COLORS.primary} radius={[0, 4, 4, 0]} name="Regulations" />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {data.sectors.slice(0, 3).map((sector, index) => (
                                        <div key={index} className="card p-6">
                                            <div className="flex items-center justify-between mb-4">
                                                <span className="text-4xl font-bold" style={{ color: CHART_COLORS[index] }}>#{index + 1}</span>
                                                <span className="text-2xl font-bold text-gray-800">{sector.count.toLocaleString()}</span>
                                            </div>
                                            <h3 className="font-semibold text-gray-700 text-sm">{sector.sector}</h3>
                                            <div className="mt-3 bg-gray-100 rounded-full h-2">
                                                <div className="h-2 rounded-full" style={{ width: `${(sector.count / data.sectors[0].count) * 100}%`, backgroundColor: CHART_COLORS[index] }} />
                                            </div>
                                            <p className="text-sm text-gray-500 mt-2">{((sector.count / data.summary.total_drafts) * 100).toFixed(1)}% of total</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'institutions' && (
                            <div className="space-y-8">
                                <div className="card p-6">
                                    <SectionHeader title="Most Active Regulatory Bodies" subtitle="Government institutions by draft regulations" />
                                    <ResponsiveContainer width="100%" height={450}>
                                        <BarChart data={data.developers} layout="vertical" margin={{ left: 30 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis type="number" tick={{ fill: '#6b7280' }} />
                                            <YAxis dataKey="developer" type="category" width={160} tick={{ fill: '#6b7280', fontSize: 10 }} />
                                            <Tooltip />
                                            <Bar dataKey="count" fill={COLORS.secondary} radius={[0, 4, 4, 0]} name="Regulations" />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="card p-6">
                                        <h3 className="font-semibold text-gray-800 mb-2">Total Bodies</h3>
                                        <p className="text-4xl font-bold text-blue-900">{data.summary.total_developers}</p>
                                        <p className="text-sm text-gray-500 mt-1">Active regulators</p>
                                    </div>
                                    <div className="card p-6">
                                        <h3 className="font-semibold text-gray-800 mb-2">Avg. Per Body</h3>
                                        <p className="text-4xl font-bold text-blue-900">{(data.summary.total_drafts / data.summary.total_developers).toFixed(1)}</p>
                                        <p className="text-sm text-gray-500 mt-1">Regulations per body</p>
                                    </div>
                                    <div className="card p-6">
                                        <h3 className="font-semibold text-gray-800 mb-2">Top Body Output</h3>
                                        <p className="text-4xl font-bold text-blue-900">{data.developers[0].count}</p>
                                        <p className="text-sm text-gray-500 mt-1">Most active regulator</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'participation' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <StatCard title="Total Comments" value={data.summary.total_comments.toLocaleString()} icon="💬" />
                                    <StatCard title="Average per Draft" value={data.summary.avg_comments} icon="📊" />
                                    <StatCard title="Zero Comments" value={`${data.summary.zero_comments_pct}%`} subtitle="No public input" icon="🔇" />
                                    <StatCard title="Median Comments" value="0" subtitle="Most get none" icon="📉" />
                                </div>
                                <div className="card p-6">
                                    <SectionHeader title="Comment Distribution" subtitle="Regulations by comment count" />
                                    <ResponsiveContainer width="100%" height={300}>
                                        <BarChart data={data.comment_distribution}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis dataKey="bucket" tick={{ fill: '#6b7280' }} />
                                            <YAxis tick={{ fill: '#6b7280' }} />
                                            <Tooltip />
                                            <Bar dataKey="count" name="Regulations" radius={[4, 4, 0, 0]}>
                                                {data.comment_distribution.map((entry, index) => (<Cell key={index} fill={index === 0 ? COLORS.danger : CHART_COLORS[index]} />))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="card p-6">
                                    <SectionHeader title="Most Commented Regulations" subtitle="Highest public engagement" />
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead><tr className="border-b">
                                                <th className="text-left py-3 px-4 font-semibold text-gray-600">#</th>
                                                <th className="text-left py-3 px-4 font-semibold text-gray-600">Regulation</th>
                                                <th className="text-left py-3 px-4 font-semibold text-gray-600">Developer</th>
                                                <th className="text-right py-3 px-4 font-semibold text-gray-600">Year</th>
                                                <th className="text-right py-3 px-4 font-semibold text-gray-600">Comments</th>
                                            </tr></thead>
                                            <tbody>
                                                {data.top_commented.map((item, index) => (
                                                    <tr key={index} className="border-b hover:bg-gray-50">
                                                        <td className="py-3 px-4"><span className="inline-flex items-center justify-center w-7 h-7 rounded-full text-white font-bold text-xs" style={{ backgroundColor: CHART_COLORS[index] }}>{index + 1}</span></td>
                                                        <td className="py-3 px-4 text-gray-800">{item.title}</td>
                                                        <td className="py-3 px-4 text-gray-600 text-xs">{item.developer}</td>
                                                        <td className="py-3 px-4 text-right text-gray-600">{item.year}</td>
                                                        <td className="py-3 px-4 text-right font-bold text-blue-900">{item.comments.toLocaleString()}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="card p-6 bg-gradient-to-r from-red-50 to-orange-50 border border-red-200">
                                    <h3 className="font-bold text-red-800 text-lg mb-3">⚠️ Public Engagement Gap</h3>
                                    <p className="text-gray-700 mb-4">Nearly 60% of draft regulations receive zero public comments, indicating significant barriers to civic participation.</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-white p-4 rounded-lg">
                                            <h4 className="font-semibold text-gray-700 mb-2">Potential Causes</h4>
                                            <ul className="text-sm text-gray-600 space-y-1"><li>• Limited public awareness</li><li>• Technical language barriers</li><li>• Short consultation periods</li><li>• Perceived lack of impact</li></ul>
                                        </div>
                                        <div className="bg-white p-4 rounded-lg">
                                            <h4 className="font-semibold text-gray-700 mb-2">Recommendations</h4>
                                            <ul className="text-sm text-gray-600 space-y-1"><li>• Proactive notification systems</li><li>• Plain language summaries</li><li>• Extended comment periods</li><li>• Publish response to comments</li></ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-gray-800 text-gray-300 py-6 mt-12">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <p className="text-sm">Regulatory Burden Dashboard • Republic of Uzbekistan • 2019-2024</p>
                            <p className="text-xs mt-2 text-gray-500">Data: regulation.gov.uz • Analysis: January 2025</p>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
