                                            <ComposedChart data={data.yearly}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                                <XAxis dataKey="year" tick={{ fill: '#6b7280' }} />
                                                <YAxis tick={{ fill: '#6b7280' }} />
                                                <Tooltip content={<CustomTooltip />} />
                                                <Bar dataKey="count" fill={COLORS.primary} radius={[4, 4, 0, 0]} name="Draft Regulations" />
                                                <Line type="monotone" dataKey="comments" stroke={COLORS.warning} strokeWidth={3} dot={{ r: 5 }} name="Comments" yAxisId={0} />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>

                                    {/* Regulation Types Pie */}
                                    <div className="card p-6">
                                        <SectionHeader title="Regulatory Instruments" subtitle="Distribution by type" />
                                        <ResponsiveContainer width="100%" height={300}>
                                            <PieChart>
                                                <Pie
                                                    data={data.reg_types.slice(0, 6)}
                                                    dataKey="count"
                                                    nameKey="type"
                                                    cx="50%"
                                                    cy="50%"
                                                    innerRadius={60}
                                                    outerRadius={100}
                                                    paddingAngle={2}
                                                    label={({ type, percent }) => `${(percent * 100).toFixed(0)}%`}
                                                >
                                                    {data.reg_types.slice(0, 6).map((entry, index) => (
                                                        <Cell key={index} fill={CHART_COLORS[index % CHART_COLORS.length]} />
                                                    ))}
                                                </Pie>
                                                <Tooltip content={<CustomTooltip />} />
                                                <Legend />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* Sectors Bar Chart */}
                                <div className="card p-6">
                                    <SectionHeader title="Top Regulatory Sectors" subtitle="Draft regulations by policy area" />
                                    <ResponsiveContainer width="100%" height={400}>
                                        <BarChart data={data.sectors.slice(0, 10)} layout="vertical" margin={{ left: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis type="number" tick={{ fill: '#6b7280' }} />
                                            <YAxis dataKey="sector" type="category" width={200} tick={{ fill: '#6b7280', fontSize: 11 }} />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Bar dataKey="count" fill={COLORS.primary} radius={[0, 4, 4, 0]} name="Regulations" />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}

                        {/* Trends Tab */}
                        {activeTab === 'trends' && (
                            <div className="space-y-8">
                                {/* Year-over-Year Change */}
                                <div className="card p-6">
                                    <SectionHeader title="Year-over-Year Change" subtitle="Annual growth rate of regulatory output" />
                                    <ResponsiveContainer width="100%" height={300}>
                                        <BarChart data={data.yoy.filter(d => d.change !== null)}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis dataKey="year" tick={{ fill: '#6b7280' }} />
                                            <YAxis tick={{ fill: '#6b7280' }} tickFormatter={(v) => `${v}%`} />
                                            <Tooltip formatter={(v) => [`${v}%`, 'Change']} />
                                            <Bar dataKey="change" name="Change %" radius={[4, 4, 0, 0]}>
                                                {data.yoy.filter(d => d.change !== null).map((entry, index) => (
                                                    <Cell key={index} fill={entry.change < 0 ? COLORS.success : COLORS.danger} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>

                                {/* Monthly Trend */}
                                <div className="card p-6">
                                    <SectionHeader title="Monthly Regulatory Output" subtitle="Draft regulations published per month" />
                                    <ResponsiveContainer width="100%" height={350}>
                                        <AreaChart data={data.monthly}>
                                            <defs>
                                                <linearGradient id="colorCount" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor={COLORS.primary} stopOpacity={0.3}/>
                                                    <stop offset="95%" stopColor={COLORS.primary} stopOpacity={0}/>
                                                </linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis dataKey="month" tick={{ fill: '#6b7280', fontSize: 10 }} angle={-45} textAnchor="end" height={80} interval={5} />
                                            <YAxis tick={{ fill: '#6b7280' }} />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Area type="monotone" dataKey="count" stroke={COLORS.primary} strokeWidth={2} fill="url(#colorCount)" name="Regulations" />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>

                                {/* Key Insights */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="card p-6 border-l-4" style={{ borderColor: COLORS.primary }}>
                                        <h3 className="font-semibold text-gray-800">Peak Year</h3>
                                        <p className="text-3xl font-bold mt-2" style={{ color: COLORS.primary }}>{peakYear.year}</p>
                                        <p className="text-gray-500 mt-1">{peakYear.count.toLocaleString()} regulations</p>
                                    </div>
                                    <div className="card p-6 border-l-4" style={{ borderColor: COLORS.success }}>
                                        <h3 className="font-semibold text-gray-800">Total Decline</h3>
                                        <p className="text-3xl font-bold mt-2 text-green-600">-65%</p>
                                        <p className="text-gray-500 mt-1">Since 2019 peak</p>
                                    </div>
                                    <div className="card p-6 border-l-4" style={{ borderColor: COLORS.warning }}>
                                        <h3 className="font-semibold text-gray-800">2024 Output</h3>
                                        <p className="text-3xl font-bold mt-2" style={{ color: COLORS.warning }}>{latestYear.count}</p>
                                        <p className="text-gray-500 mt-1">Draft regulations</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Sectors Tab */}
                        {activeTab === 'sectors' && (
                            <div className="space-y-8">
                                {/* Full Sectors Chart */}
                                <div className="card p-6">
                                    <SectionHeader title="All Regulatory Sectors" subtitle="Complete breakdown of regulatory activity by policy area" />
                                    <ResponsiveContainer width="100%" height={500}>
                                        <BarChart data={data.sectors} layout="vertical" margin={{ left: 30 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis type="number" tick={{ fill: '#6b7280' }} />
                                            <YAxis dataKey="sector" type="category" width={280} tick={{ fill: '#6b7280', fontSize: 11 }} />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Bar dataKey="count" fill={COLORS.primary} radius={[0, 4, 4, 0]} name="Regulations" />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>

                                {/* Top 3 Sectors Detail */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {data.sectors.slice(0, 3).map((sector, index) => (
                                        <div key={index} className="card p-6">
                                            <div className="flex items-center justify-between mb-4">
                                                <span className="text-4xl font-bold" style={{ color: CHART_COLORS[index] }}>#{index + 1}</span>
                                                <span className="text-2xl font-bold text-gray-800">{sector.count.toLocaleString()}</span>
                                            </div>
                                            <h3 className="font-semibold text-gray-700 text-sm">{sector.sector}</h3>
                                            <div className="mt-3 bg-gray-100 rounded-full h-2">
                                                <div 
                                                    className="h-2 rounded-full" 
                                                    style={{ 
                                                        width: `${(sector.count / data.sectors[0].count) * 100}%`,
                                                        backgroundColor: CHART_COLORS[index]
                                                    }}
                                                />
                                            </div>
                                            <p className="text-sm text-gray-500 mt-2">
                                                {((sector.count / data.summary.total_drafts) * 100).toFixed(1)}% of total
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Institutions Tab */}
                        {activeTab === 'institutions' && (
                            <div className="space-y-8">
                                {/* Top Regulators Chart */}
                                <div className="card p-6">
                                    <SectionHeader title="Most Active Regulatory Bodies" subtitle="Government institutions by number of draft regulations" />
                                    <ResponsiveContainer width="100%" height={500}>
                                        <BarChart data={data.developers} layout="vertical" margin={{ left: 30 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis type="number" tick={{ fill: '#6b7280' }} />
                                            <YAxis dataKey="developer" type="category" width={320} tick={{ fill: '#6b7280', fontSize: 10 }} />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Bar dataKey="count" fill={COLORS.secondary} radius={[0, 4, 4, 0]} name="Regulations" />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>

                                {/* Institutional Stats */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="card p-6">
                                        <h3 className="font-semibold text-gray-800 mb-4">Institutional Concentration</h3>
                                        <div className="space-y-4">
                                            <div>
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="text-gray-600">Top 5 bodies</span>
                                                    <span className="font-medium">{((data.developers.slice(0, 5).reduce((a, b) => a + b.count, 0) / data.summary.total_drafts) * 100).toFixed(1)}%</span>
                                                </div>
                                                <div className="bg-gray-100 rounded-full h-3">
                                                    <div className="h-3 rounded-full bg-blue-600" style={{ width: `${(data.developers.slice(0, 5).reduce((a, b) => a + b.count, 0) / data.summary.total_drafts) * 100}%` }} />
                                                </div>
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="text-gray-600">Top 10 bodies</span>
                                                    <span className="font-medium">{((data.developers.slice(0, 10).reduce((a, b) => a + b.count, 0) / data.summary.total_drafts) * 100).toFixed(1)}%</span>
                                                </div>
                                                <div className="bg-gray-100 rounded-full h-3">
                                                    <div className="h-3 rounded-full bg-blue-500" style={{ width: `${(data.developers.slice(0, 10).reduce((a, b) => a + b.count, 0) / data.summary.total_drafts) * 100}%` }} />
                                                </div>
                                            </div>
                                            <div>
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="text-gray-600">Top 15 bodies</span>
                                                    <span className="font-medium">{((data.developers.slice(0, 15).reduce((a, b) => a + b.count, 0) / data.summary.total_drafts) * 100).toFixed(1)}%</span>
                                                </div>
                                                <div className="bg-gray-100 rounded-full h-3">
                                                    <div className="h-3 rounded-full bg-blue-400" style={{ width: `${(data.developers.slice(0, 15).reduce((a, b) => a + b.count, 0) / data.summary.total_drafts) * 100}%` }} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="card p-6">
                                        <h3 className="font-semibold text-gray-800 mb-4">Key Statistics</h3>
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center py-3 border-b">
                                                <span className="text-gray-600">Total regulatory bodies</span>
                                                <span className="text-2xl font-bold text-gray-800">{data.summary.total_developers}</span>
                                            </div>
                                            <div className="flex justify-between items-center py-3 border-b">
                                                <span className="text-gray-600">Avg. regulations per body</span>
                                                <span className="text-2xl font-bold text-gray-800">{(data.summary.total_drafts / data.summary.total_developers).toFixed(1)}</span>
                                            </div>
                                            <div className="flex justify-between items-center py-3">
                                                <span className="text-gray-600">Most active body</span>
                                                <span className="text-2xl font-bold" style={{ color: COLORS.primary }}>{data.developers[0].count}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Participation Tab */}
                        {activeTab === 'participation' && (
                            <div className="space-y-8">
                                {/* Engagement Stats */}
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <StatCard 
                                        title="Total Comments" 
                                        value={data.summary.total_comments.toLocaleString()}
                                        icon="💬"
                                    />
                                    <StatCard 
                                        title="Average per Draft" 
                                        value={data.summary.avg_comments}
                                        icon="📊"
                                    />
                                    <StatCard 
                                        title="Zero Comments" 
                                        value={`${data.summary.zero_comments_pct}%`}
                                        subtitle="No public input"
                                        icon="🔇"
                                    />
                                    <StatCard 
                                        title="Median Comments" 
                                        value="0"
                                        subtitle="Most get none"
                                        icon="📉"
                                    />
                                </div>

                                {/* Comment Distribution */}
                                <div className="card p-6">
                                    <SectionHeader title="Comment Distribution" subtitle="Number of draft regulations by comment count" />
                                    <ResponsiveContainer width="100%" height={350}>
                                        <BarChart data={data.comment_distribution}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                            <XAxis dataKey="bucket" tick={{ fill: '#6b7280' }} />
                                            <YAxis tick={{ fill: '#6b7280' }} />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Bar dataKey="count" name="Regulations" radius={[4, 4, 0, 0]}>
                                                {data.comment_distribution.map((entry, index) => (
                                                    <Cell key={index} fill={index === 0 ? COLORS.danger : CHART_COLORS[index]} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>

                                {/* Most Commented Regulations */}
                                <div className="card p-6">
                                    <SectionHeader title="Most Commented Regulations" subtitle="Draft legal acts with highest public engagement" />
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="border-b">
                                                    <th className="text-left py-3 px-4 font-semibold text-gray-600">Rank</th>
                                                    <th className="text-left py-3 px-4 font-semibold text-gray-600">Regulation</th>
                                                    <th className="text-left py-3 px-4 font-semibold text-gray-600">Developer</th>
                                                    <th className="text-right py-3 px-4 font-semibold text-gray-600">Year</th>
                                                    <th className="text-right py-3 px-4 font-semibold text-gray-600">Comments</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {data.top_commented.map((item, index) => (
                                                    <tr key={index} className="border-b hover:bg-gray-50">
                                                        <td className="py-3 px-4">
                                                            <span className="inline-flex items-center justify-center w-8 h-8 rounded-full text-white font-bold text-sm" style={{ backgroundColor: CHART_COLORS[index] }}>
                                                                {index + 1}
                                                            </span>
                                                        </td>
                                                        <td className="py-3 px-4 text-gray-800">{item.title}</td>
                                                        <td className="py-3 px-4 text-gray-600 text-xs">{item.developer}</td>
                                                        <td className="py-3 px-4 text-right text-gray-600">{item.year}</td>
                                                        <td className="py-3 px-4 text-right font-bold" style={{ color: COLORS.primary }}>{item.comments.toLocaleString()}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* Engagement Gap Analysis */}
                                <div className="card p-6 bg-gradient-to-r from-red-50 to-orange-50 border border-red-100">
                                    <h3 className="font-bold text-red-800 text-lg mb-3">⚠️ Public Engagement Gap</h3>
                                    <p className="text-gray-700 mb-4">
                                        Nearly 60% of draft regulations receive zero public comments, indicating significant barriers to civic participation in the rulemaking process.
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-white p-4 rounded-lg">
                                            <h4 className="font-semibold text-gray-700 mb-2">Potential Causes</h4>
                                            <ul className="text-sm text-gray-600 space-y-1">
                                                <li>• Limited public awareness of consultation process</li>
                                                <li>• Technical language barriers</li>
                                                <li>• Short consultation periods</li>
                                                <li>• Perceived lack of impact</li>
                                            </ul>
                                        </div>
                                        <div className="bg-white p-4 rounded-lg">
                                            <h4 className="font-semibold text-gray-700 mb-2">Recommendations</h4>
                                            <ul className="text-sm text-gray-600 space-y-1">
                                                <li>• Proactive notification systems</li>
                                                <li>• Plain language summaries</li>
                                                <li>• Extended comment periods</li>
                                                <li>• Publish response to comments</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-gray-300 py-6 mt-12">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <p className="text-sm">Regulatory Burden Dashboard • Republic of Uzbekistan • 2019-2024</p>
                            <p className="text-xs mt-2 text-gray-500">Data sourced from regulation.gov.uz • Analysis generated January 2025</p>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
